<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacobs Relocation — Listing Matcher</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0f1a;--ink2:#1a1a2e;--gold:#c9a84c;--gold2:#e8c96a;--cream:#faf8f3;--muted:#8888a0;--border:rgba(201,168,76,0.15);--border2:rgba(255,255,255,0.06);--card:#16162a;--card2:#1e1e35;--success:#10b981;--danger:#ef4444;--warn:#f59e0b}
html{font-size:14px}body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh}
.header{background:linear-gradient(135deg,var(--ink2) 0%,#1a1230 100%);border-bottom:2px solid var(--gold);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:36px;height:36px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink)}
.brand-text .name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#fff;display:block;line-height:1}
.brand-text .sub{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-top:3px;display:block}
.main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem}
.layout{display:grid;grid-template-columns:420px 1fr;gap:1.5rem;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:1rem}
.panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--gold)}
.panel-body{padding:1.25rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.single{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.field-block label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.input,.select,.textarea{width:100%;background:var(--ink2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--cream);outline:none;transition:border-color .15s}
.input:focus,.select:focus,.textarea:focus{border-color:var(--gold)}
.input::placeholder{color:var(--muted)}
.textarea{resize:vertical;min-height:80px}
.select{appearance:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s}
.btn-primary{background:var(--gold);color:var(--ink);font-weight:600}
.btn-primary:hover{background:var(--gold2)}
.btn-secondary{background:var(--card2);color:var(--muted);border-color:var(--border2)}
.btn-secondary:hover{color:var(--cream);border-color:var(--border)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-gmail{background:rgba(234,67,53,.12);color:#f28b82;border-color:rgba(234,67,53,.2)}
.btn-gmail:hover{background:rgba(234,67,53,.22)}
.btn-whatsapp{background:rgba(37,211,102,.12);color:#25d366;border-color:rgba(37,211,102,.2)}
.btn-whatsapp:hover{background:rgba(37,211,102,.22)}
.btn-sms{background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.2)}
.btn-sms:hover{background:rgba(59,130,246,.22)}
.listings-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.listing-chip{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.lc-addr{font-size:13px;font-weight:500;color:#fff;flex:1}
.lc-price{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold)}
.lc-meta{font-size:11px;color:var(--muted)}
.lc-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px}
.lc-remove:hover{color:var(--danger)}
.match-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:12px}
.match-card:hover{border-color:var(--border)}
.match-header{padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border2)}
.match-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;flex-shrink:0}
.match-name{font-size:15px;font-weight:600;color:#fff}
.match-meta{font-size:11px;color:var(--muted);margin-top:2px}
.score-badge{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;padding:4px 12px;border-radius:8px;margin-left:auto}
.score-excellent{background:rgba(16,185,129,.15);color:#34d399}
.score-good{background:rgba(201,168,76,.15);color:var(--gold)}
.score-fair{background:rgba(245,158,11,.15);color:#fbbf24}
.score-poor{background:rgba(107,114,128,.15);color:#9ca3af}
.match-reasons{padding:.75rem 1.25rem;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border2)}
.reason-pill{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500}
.r-pass{background:rgba(16,185,129,.12);color:#34d399}
.r-warn{background:rgba(245,158,11,.12);color:#fbbf24}
.r-fail{background:rgba(239,68,68,.12);color:#f87171}
.match-actions{padding:.75rem 1.25rem;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.match-listing-label{font-size:11px;color:var(--muted);margin-right:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fbtn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.fbtn:hover{color:var(--cream)}
.fbtn.on{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600}
.listing-tabs{display:flex;gap:4px;margin-bottom:1rem;background:var(--card2);border-radius:8px;padding:3px}
.ltab{flex:1;font-size:11px;font-weight:500;padding:6px 10px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.ltab:hover{color:var(--cream)}
.ltab.on{background:var(--gold);color:var(--ink);font-weight:600}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty-icon{font-size:36px;opacity:.4;margin-bottom:10px}
.empty-text{font-size:13px;line-height:1.6}
.section-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:0 0 10px}
.msg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.msg-overlay.open{opacity:1;pointer-events:all}
.msg-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto}
.msg-header{padding:1.25rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
.msg-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#fff}
.msg-close{background:none;border:1px solid var(--border2);color:var(--muted);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:14px}
.msg-close:hover{color:var(--cream)}
.msg-body{padding:1.25rem}
.msg-preview{background:var(--ink2);border:1px solid var(--border2);border-radius:8px;padding:1rem;font-size:13px;line-height:1.7;color:var(--cream);white-space:pre-wrap;min-height:180px;margin-bottom:10px;font-family:'Georgia',serif}
.msg-footer{padding:1rem 1.25rem;border-top:1px solid var(--border2);display:flex;gap:8px;justify-content:flex-end}
@media(max-width:768px){.header,.main{padding-left:1rem;padding-right:1rem}}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="brand-mark">J</div>
    <div class="brand-text">
      <span class="name">Jacobs Relocation</span>
      <span class="sub">Listing Matcher</span>
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted)" id="clientCount"></div>
</div>

<div class="main">
  <div class="layout">

    <!-- LEFT: LISTING INPUT -->
    <div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Add MLS listing</span></div>
        <div class="panel-body">
          <div class="form-row single">
            <div class="field-block"><label>Address</label>
              <input class="input" id="l-address" placeholder="e.g. 17117 Teton River Rd, Boca Raton, FL 33496">
            </div>
          </div>
          <div class="form-row">
            <div class="field-block"><label>Asking price</label>
              <input class="input" id="l-price" placeholder="e.g. $1,850,000">
            </div>
            <div class="field-block"><label>Community</label>
              <input class="input" id="l-community" placeholder="e.g. Lotus Edge">
            </div>
          </div>
          <div class="form-row three">
            <div class="field-block"><label>Beds</label>
              <select class="select" id="l-beds">
                <option value="">-</option>
                <option value="1">1</option><option value="2">2</option>
                <option value="3">3</option><option value="4">4</option>
                <option value="5">5</option><option value="6">6</option><option value="7">7+</option>
              </select>
            </div>
            <div class="field-block"><label>Baths</label>
              <select class="select" id="l-baths">
                <option value="">-</option>
                <option value="1">1</option><option value="1.5">1.5</option>
                <option value="2">2</option><option value="2.5">2.5</option>
                <option value="3">3</option><option value="3.5">3.5</option>
                <option value="4">4</option><option value="4.5">4.5</option><option value="5">5+</option>
              </select>
            </div>
            <div class="field-block"><label>Garage</label>
              <select class="select" id="l-garage">
                <option value="">-</option>
                <option value="1">1</option><option value="2">2</option>
                <option value="3">3</option><option value="4">4+</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="field-block"><label>Sq ft</label>
              <input class="input" id="l-sqft" placeholder="e.g. 3,500">
            </div>
            <div class="field-block"><label>HOA / month</label>
              <input class="input" id="l-hoa" placeholder="e.g. $650">
            </div>
          </div>
          <div class="form-row">
            <div class="field-block"><label>Property type</label>
              <select class="select" id="l-type">
                <option value="">Select...</option>
                <option value="Single Family">Single Family</option>
                <option value="Condo">Condo</option>
                <option value="Townhouse">Townhouse</option>
                <option value="Villa">Villa</option>
                <option value="Multi-Family">Multi-Family</option>
              </select>
            </div>
            <div class="field-block"><label>Pool</label>
              <select class="select" id="l-pool">
                <option value="">No pool</option>
                <option value="yes">Pool included</option>
                <option value="optional">Pool optional/can add</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="field-block"><label>Style</label>
              <select class="select" id="l-style">
                <option value="">Standard</option>
                <option value="waterfront">Waterfront</option>
                <option value="golf">Golf course</option>
                <option value="gated">Gated</option>
                <option value="corner">Corner lot</option>
                <option value="cul-de-sac">Cul-de-sac</option>
              </select>
            </div>
            <div class="field-block"><label>Furnished</label>
              <select class="select" id="l-furnished">
                <option value="unfurnished">Unfurnished</option>
                <option value="furnished">Furnished</option>
                <option value="negotiable">Negotiable</option>
              </select>
            </div>
          </div>
          <div class="form-row single">
            <div class="field-block"><label>MLS # / URL</label>
              <input class="input" id="l-mls" placeholder="MLS number or listing URL">
            </div>
          </div>
          <div class="form-row single">
            <div class="field-block"><label>Your notes on this listing</label>
              <textarea class="textarea" id="l-notes" placeholder="Key selling points, condition, why it's worth seeing..."></textarea>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:4px;">
            <button class="btn btn-primary" style="flex:1;" onclick="addListing()">+ Add to batch</button>
            <button class="btn btn-secondary" onclick="clearListingForm()">Clear</button>
          </div>
        </div>
      </div>

      <div class="panel" id="batchPanel" style="display:none;">
        <div class="panel-header">
          <span class="panel-title">Batch — <span id="batchCount">0</span> listings</span>
          <button class="btn btn-sm btn-secondary" onclick="clearBatch()">Clear all</button>
        </div>
        <div class="panel-body">
          <div class="listings-list" id="listingsList"></div>
          <button class="btn btn-primary" style="width:100%;" onclick="runMatching()">🎯 Match against all clients</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: RESULTS -->
    <div>
      <div id="resultsEmpty" class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-text">Add a listing and run matching.<br><span style="font-size:11px;opacity:.6">Each listing is scored against every active client's saved preferences. Matched clients get Gmail + WhatsApp drafts ready to send.</span></div>
      </div>

      <div id="resultsWrap" style="display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
          <div class="section-label" id="resultsTitle" style="margin:0;">Match results</div>
          <div class="filter-bar" style="margin:0;">
            <button class="fbtn on" onclick="filterResults('all',this)">All</button>
            <button class="fbtn" onclick="filterResults('excellent',this)">🟢 90%+</button>
            <button class="fbtn" onclick="filterResults('good',this)">🟡 70%+</button>
            <button class="fbtn" onclick="filterResults('hot',this)">🔴 Hot clients</button>
          </div>
        </div>
        <div id="listingTabsWrap"></div>
        <div id="matchResults"></div>
      </div>
    </div>

  </div>
</div>

<!-- MESSAGE MODAL -->
<div class="msg-overlay" id="msgOverlay" onclick="closeMsgOutside(event)">
  <div class="msg-modal">
    <div class="msg-header">
      <div class="msg-title" id="msgTitle">Message</div>
      <button class="msg-close" onclick="closeMsg()">x</button>
    </div>
    <div class="msg-body">
      <div class="msg-preview" id="msgPreview" contenteditable="true"></div>
    </div>
    <div class="msg-footer">
      <button class="btn btn-secondary" onclick="closeMsg()">Cancel</button>
      <button class="btn btn-primary" id="msgActionBtn" onclick="copyMsgToClipboard()">Copy to clipboard</button>
    </div>
  </div>
</div>

<script>
function loadClients(){try{return JSON.parse(localStorage.getItem('jr_clients')||'[]')}catch(e){return[]}}
let clients=loadClients();
let listings=[];
let allResults=[];
let currentResultFilter='all';
let currentListingTab=0;

const PALETTE=['#c9a84c','#3b82f6','#8b5cf6','#10b981','#ef4444','#f59e0b','#06b6d4','#ec4899'];
function avatarColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%PALETTE.length;return PALETTE[h]}
function initials(n){return n.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()}
const ORIGIN_FLAGS={uk:'🇬🇧',canada:'🇨🇦',us:'🇺🇸',australia:'🇦🇺',other:'🌍'};
const STATUS_LABELS={hot:'🔴 Hot',active:'⭐ Active',warm:'🔵 Warm',visa:'🟣 Visa pending',cold:'⚪ Cold'};

function updateHeader(){
  const active=clients.filter(c=>!['closed','cold'].includes(c.status));
  document.getElementById('clientCount').textContent=active.length+' active clients loaded';
}
updateHeader();

function parseMoney(s){
  if(!s)return 0;
  const n=parseFloat(s.toString().replace(/[$,\s]/g,''));
  if(/m/i.test(s))return n*1000000;
  if(/k/i.test(s))return n*1000;
  return n||0;
}

function getListingForm(){
  return{
    id:Date.now(),
    address:document.getElementById('l-address').value.trim(),
    price:document.getElementById('l-price').value.trim(),
    priceNum:parseMoney(document.getElementById('l-price').value),
    community:document.getElementById('l-community').value.trim(),
    beds:parseInt(document.getElementById('l-beds').value)||0,
    baths:parseFloat(document.getElementById('l-baths').value)||0,
    garage:parseInt(document.getElementById('l-garage').value)||0,
    sqft:parseInt(document.getElementById('l-sqft').value.replace(/[,]/g,''))||0,
    hoa:parseMoney(document.getElementById('l-hoa').value),
    type:document.getElementById('l-type').value,
    pool:document.getElementById('l-pool').value,
    style:document.getElementById('l-style').value,
    furnished:document.getElementById('l-furnished').value,
    mls:document.getElementById('l-mls').value.trim(),
    notes:document.getElementById('l-notes').value.trim()
  };
}

function addListing(){
  const l=getListingForm();
  if(!l.address){alert('Address is required.');return}
  listings.push(l);
  renderBatch();
  clearListingForm();
}

function clearListingForm(){
  ['l-address','l-price','l-community','l-sqft','l-hoa','l-mls','l-notes'].forEach(id=>document.getElementById(id).value='');
  ['l-beds','l-baths','l-garage','l-type','l-pool','l-style','l-furnished'].forEach(id=>{const el=document.getElementById(id);el.selectedIndex=0});
}

function removeListing(id){listings=listings.filter(l=>l.id!==id);renderBatch()}

function clearBatch(){
  listings=[];renderBatch();
  document.getElementById('resultsEmpty').style.display='';
  document.getElementById('resultsWrap').style.display='none';
}

function renderBatch(){
  const panel=document.getElementById('batchPanel');
  const list=document.getElementById('listingsList');
  document.getElementById('batchCount').textContent=listings.length;
  if(!listings.length){panel.style.display='none';return}
  panel.style.display='';
  list.innerHTML=listings.map(l=>`
    <div class="listing-chip">
      <div style="flex:1;">
        <div class="lc-addr">${l.address}</div>
        <div class="lc-meta">${[l.beds?l.beds+'bd':'',l.baths?l.baths+'ba':'',l.sqft?l.sqft.toLocaleString()+'sqft':'',l.pool==='yes'?'Pool':''].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="lc-price">${l.price||'POA'}</div>
      <button class="lc-remove" onclick="removeListing(${l.id})">x</button>
    </div>`).join('');
}

function scoreListingAgainstClient(listing,client){
  let score=0,maxScore=0;
  const reasons=[];

  // BUDGET
  const budgetMax=parseMoney(client.budget);
  const budgetMin=parseMoney(client.budgetMin);
  if(budgetMax>0){
    maxScore+=30;
    if(listing.priceNum<=budgetMax){
      if(budgetMin>0&&listing.priceNum>=budgetMin){score+=30;reasons.push({text:'Price within budget range',cls:'r-pass'})}
      else{score+=30;reasons.push({text:'Price within budget',cls:'r-pass'})}
    } else {
      const over=((listing.priceNum-budgetMax)/budgetMax*100).toFixed(0);
      if(parseInt(over)<=10){score+=15;reasons.push({text:over+'% over budget',cls:'r-warn'})}
      else{reasons.push({text:over+'% over budget max',cls:'r-fail'})}
    }
  }

  // AREA
  maxScore+=20;
  const clientArea=(client.area||'').toLowerCase();
  const listingComm=(listing.community||'').toLowerCase();
  const listingAddr=(listing.address||'').toLowerCase();
  if(clientArea){
    const baseArea=clientArea.split(',')[0].trim();
    if(listingComm.includes(baseArea)||listingAddr.includes(baseArea)||baseArea.includes(listingComm)){
      score+=20;reasons.push({text:'In target area/community',cls:'r-pass'})
    } else {
      const words=clientArea.split(/[\s,]+/).filter(w=>w.length>3);
      if(words.some(w=>listingAddr.includes(w)||listingComm.includes(w))){
        score+=10;reasons.push({text:'Partial area match',cls:'r-warn'})
      } else {
        reasons.push({text:'Outside target area',cls:'r-fail'})
      }
    }
  }

  // PROPERTY TYPE
  if(client.proptype&&client.proptype!=='Any'&&client.proptype!==''){
    maxScore+=10;
    if(!listing.type||listing.type===client.proptype){score+=10;reasons.push({text:'Type matches: '+client.proptype,cls:'r-pass'})}
    else{reasons.push({text:'Type mismatch (wants '+client.proptype+')',cls:'r-fail'})}
  }

  // BEDS
  if(client.bedsMin){
    maxScore+=10;
    if(listing.beds>=parseInt(client.bedsMin)){score+=10;reasons.push({text:listing.beds+'bd (min '+client.bedsMin+')',cls:'r-pass'})}
    else{reasons.push({text:'Only '+listing.beds+'bd (min '+client.bedsMin+')',cls:'r-fail'})}
  }
  if(client.bedsMax&&listing.beds>parseInt(client.bedsMax)){
    reasons.push({text:'Too many beds (max '+client.bedsMax+')',cls:'r-warn'});score=Math.max(0,score-5)
  }

  // BATHS
  if(client.bathsMin){
    maxScore+=5;
    if(listing.baths>=parseFloat(client.bathsMin)){score+=5;reasons.push({text:listing.baths+'ba',cls:'r-pass'})}
    else{reasons.push({text:'Only '+listing.baths+'ba (min '+client.bathsMin+')',cls:'r-fail'})}
  }

  // POOL
  if(client.pool==='required'){
    maxScore+=15;
    if(listing.pool==='yes'){score+=15;reasons.push({text:'Pool included (required)',cls:'r-pass'})}
    else if(listing.pool==='optional'){score+=7;reasons.push({text:'Pool optional/can add',cls:'r-warn'})}
    else{reasons.push({text:'No pool — client requires pool',cls:'r-fail'})}
  } else if(client.pool==='preferred'){
    maxScore+=7;
    if(listing.pool==='yes'){score+=7;reasons.push({text:'Pool included (preferred)',cls:'r-pass'})}
  }

  // GARAGE
  if(client.garage){
    maxScore+=5;
    if(listing.garage>=parseInt(client.garage)){score+=5;reasons.push({text:listing.garage+'-car garage',cls:'r-pass'})}
    else if(listing.garage>0){reasons.push({text:listing.garage+' garage (wants '+client.garage+'+)',cls:'r-warn'})}
  }

  // SQFT
  if(client.sqftMin&&listing.sqft>0){
    maxScore+=5;
    const minSq=parseInt((client.sqftMin||'').replace(/[,]/g,''))||0;
    if(listing.sqft>=minSq){score+=5;reasons.push({text:listing.sqft.toLocaleString()+'sqft',cls:'r-pass'})}
    else{reasons.push({text:'Too small: '+listing.sqft.toLocaleString()+'sqft',cls:'r-fail'})}
  }
  if(client.sqftMax&&listing.sqft>0){
    const maxSq=parseInt((client.sqftMax||'').replace(/[,]/g,''))||0;
    if(maxSq>0&&listing.sqft>maxSq){reasons.push({text:'Too large: '+listing.sqft.toLocaleString()+'sqft',cls:'r-warn'});score=Math.max(0,score-3)}
  }

  // HOA
  if(client.maxHOA&&listing.hoa>0){
    maxScore+=5;
    const maxHoa=parseMoney(client.maxHOA);
    if(listing.hoa<=maxHoa){score+=5;reasons.push({text:'HOA $'+listing.hoa+'/mo ok',cls:'r-pass'})}
    else{reasons.push({text:'HOA $'+listing.hoa+'/mo over limit',cls:'r-fail'})}
  }

  // STYLE
  if(client.style&&client.style!==''&&listing.style&&client.style===listing.style){
    maxScore+=5;score+=5;reasons.push({text:listing.style+' (preferred)',cls:'r-pass'})
  }

  // FURNISHED
  if(client.furnished==='furnished-required'&&listing.furnished==='unfurnished'){
    reasons.push({text:'Not furnished (required)',cls:'r-fail'})
  } else if((client.furnished==='furnished'||client.furnished==='furnished-required')&&listing.furnished==='furnished'){
    maxScore+=5;score+=5;reasons.push({text:'Furnished',cls:'r-pass'})
  }

  const pct=maxScore>0?Math.min(100,Math.round(score/maxScore*100)):40;
  return{client,score:pct,reasons,isHot:client.status==='hot',isActive:['hot','active'].includes(client.status)}
}

function runMatching(){
  if(!listings.length){alert('Add at least one listing first.');return}
  const active=clients.filter(c=>!['closed','cold'].includes(c.status));
  if(!active.length){alert('No active clients found. Make sure you opened the CRM first in this browser.');return}
  allResults=listings.map(listing=>{
    const matches=active.map(c=>scoreListingAgainstClient(listing,c)).filter(r=>r.score>20).sort((a,b)=>b.score-a.score);
    return{listing,matches}
  });
  document.getElementById('resultsEmpty').style.display='none';
  document.getElementById('resultsWrap').style.display='';
  currentListingTab=0;
  renderListingTabs();
  renderResults();
}

function renderListingTabs(){
  const wrap=document.getElementById('listingTabsWrap');
  if(allResults.length<=1){wrap.innerHTML='';return}
  wrap.innerHTML='<div class="listing-tabs">'+allResults.map((r,i)=>
    `<button class="ltab ${i===currentListingTab?'on':''}" onclick="switchListingTab(${i})">${r.listing.address.split(',')[0]}</button>`
  ).join('')+'</div>'
}

function switchListingTab(i){currentListingTab=i;renderListingTabs();renderResults()}

function filterResults(f,btn){
  currentResultFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderResults();
}

function scoreClass(s){
  if(s>=90)return'score-excellent';
  if(s>=70)return'score-good';
  if(s>=50)return'score-fair';
  return'score-poor';
}

function renderResults(){
  const data=allResults[currentListingTab];
  if(!data)return;
  const{listing,matches}=data;
  document.getElementById('resultsTitle').textContent=matches.length+' client matches — '+listing.address.split(',')[0];
  let filtered=matches;
  if(currentResultFilter==='excellent')filtered=matches.filter(r=>r.score>=90);
  else if(currentResultFilter==='good')filtered=matches.filter(r=>r.score>=70);
  else if(currentResultFilter==='hot')filtered=matches.filter(r=>r.isHot);
  if(!filtered.length){
    document.getElementById('matchResults').innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No matches for this filter.</div></div>';
    return;
  }
  document.getElementById('matchResults').innerHTML=filtered.map(r=>{
    const c=r.client;
    const col=avatarColor(c.name);
    const sc=scoreClass(r.score);
    return`<div class="match-card">
      <div class="match-header">
        <div class="match-avatar" style="background:${col}20;color:${col}">${initials(c.name)}</div>
        <div style="flex:1;">
          <div class="match-name">${c.name}</div>
          <div class="match-meta">${ORIGIN_FLAGS[c.origin]||''} ${STATUS_LABELS[c.status]||c.status} &nbsp;·&nbsp; Budget: ${c.budget||'TBC'}</div>
        </div>
        <div class="score-badge ${sc}">${r.score}%</div>
      </div>
      <div class="match-reasons">
        ${r.reasons.slice(0,10).map(reason=>`<span class="reason-pill ${reason.cls}">${reason.text}</span>`).join('')}
      </div>
      <div class="match-actions">
        <span class="match-listing-label">Send:</span>
        <button class="btn btn-sm btn-gmail" onclick="doGmail('${c.id}',${listing.id})">Email via Gmail</button>
        ${r.isActive?`<button class="btn btn-sm btn-whatsapp" onclick="doWhatsApp('${c.id}',${listing.id})">WhatsApp</button>`:''}
        ${r.isActive&&c.phone?`<button class="btn btn-sm btn-sms" onclick="doSMS('${c.id}',${listing.id})">SMS</button>`:''}
      </div>
    </div>`
  }).join('');
}

function getClientById(id){return clients.find(c=>String(c.id)===String(id))}
function getListingById(id){return listings.find(l=>l.id===parseInt(id))}

function buildGmailBody(client,listing){
  const fn=client.name.split(' ')[0];
  const details=[
    listing.beds?listing.beds+'bd':'',
    listing.baths?listing.baths+'ba':'',
    listing.sqft?listing.sqft.toLocaleString()+'sqft':'',
    listing.pool==='yes'?'private pool':'',
    listing.garage?listing.garage+'-car garage':'',
    listing.furnished==='furnished'?'furnished':''
  ].filter(Boolean).join(' · ');
  const community=listing.community?' in '+listing.community:'';
  const mlsLine=listing.mls?'\nMLS: '+listing.mls:'';
  const pts=[];
  if(client.area)pts.push(client.area);
  if(client.bedsMin)pts.push(client.bedsMin+'+ beds');
  if(client.pool==='required'&&listing.pool==='yes')pts.push('pool');
  const matchSummary=pts.length?pts.join(', '):'your criteria';
  return`Hi ${fn},

Just pulled something from the MLS I think is worth your attention.

${listing.address}${community}
${listing.price}${details?' · '+details:''}${mlsLine}

${listing.notes?listing.notes+'\n\n':''}This one fits closely with what you have described — ${matchSummary}.

Happy to set up a showing at your convenience — just let me know and I will arrange it.

Best,
Adam

Adam Jacobs | Jacobs Relocation
jacobsrelocation.com`
}

function buildWhatsAppBody(client,listing){
  const details=[
    listing.beds?listing.beds+'bd':'',
    listing.baths?listing.baths+'ba':'',
    listing.pool==='yes'?'pool':'',
    listing.sqft?listing.sqft.toLocaleString()+'sqft':''
  ].filter(Boolean).join('/');
  return`Adam here — just pulled a listing I think fits exactly what you are after.

${listing.address}
${listing.price}${details?' · '+details:''}
${listing.community||''}

${listing.notes?listing.notes+' ':''}Worth a look? I can arrange a showing quickly.`
}

function buildSMSBody(client,listing){
  return`Adam (Jacobs Relocation) — new listing: ${listing.address}, ${listing.price}${listing.beds?', '+listing.beds+'bd':''}${listing.pool==='yes'?', pool':''}.  Fits your criteria. Want a showing?`
}

function doGmail(clientId,listingId){
  const client=getClientById(clientId);
  const listing=getListingById(listingId);
  if(!client||!listing)return;
  const body=buildGmailBody(client,listing);
  const subject=encodeURIComponent('New listing for you — '+listing.address.split(',')[0]);
  const to=encodeURIComponent(client.email||'');
  window.open('https://mail.google.com/mail/?view=cm&fs=1&to='+to+'&su='+subject+'&body='+encodeURIComponent(body),'_blank');
}

function doWhatsApp(clientId,listingId){
  const client=getClientById(clientId);
  const listing=getListingById(listingId);
  if(!client||!listing)return;
  const msg=buildWhatsAppBody(client,listing);
  const phone=(client.phone||'').replace(/[\s\-\(\)]/g,'');
  if(phone){
    window.open('https://wa.me/'+phone.replace('+','')+'?text='+encodeURIComponent(msg),'_blank');
  } else {
    showMsgModal('WhatsApp — '+client.name,msg);
  }
}

function doSMS(clientId,listingId){
  const client=getClientById(clientId);
  const listing=getListingById(listingId);
  if(!client||!listing)return;
  const msg=buildSMSBody(client,listing);
  const phone=(client.phone||'').replace(/[\s\-\(\)]/g,'');
  if(phone){
    window.open('sms:'+phone+'?body='+encodeURIComponent(msg),'_blank');
  } else {
    showMsgModal('SMS — '+client.name,msg);
  }
}

function showMsgModal(title,msg){
  document.getElementById('msgTitle').textContent=title;
  document.getElementById('msgPreview').textContent=msg;
  document.getElementById('msgOverlay').classList.add('open');
}

function copyMsgToClipboard(){
  const text=document.getElementById('msgPreview').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    closeMsg();
    alert('Message copied to clipboard.');
  });
}

function closeMsg(){document.getElementById('msgOverlay').classList.remove('open')}
function closeMsgOutside(e){if(e.target.id==='msgOverlay')closeMsg()}
</script>
